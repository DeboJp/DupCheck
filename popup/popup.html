<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DupCheck</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DupCheck Logo">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>DupCheck</h1>
    </div>
    <div class="actions">
       <button id="exportCsvBtn" title="Export to CSV">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
       </button>
       <label class="switch">
         <input type="checkbox" id="toggleSwitch" aria-label="Toggle Extension">
         <span class="slider round"></span>
       </label>
    </div>
  </div>
  
  <div class="stats-row">
    <div class="stat-box">
      <span class="stat-label">Total Tracked</span>
      <span class="stat-value" id="totalCount">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Daily Count</span>
      <span class="stat-value" id="dailyCount">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Daily High</span>
      <span class="stat-value" id="dailyHighCount">0</span>
    </div>
  </div>

  <div class="status-banner" id="statusBanner">
    <span class="status-icon" id="statusIcon" aria-hidden="true">--</span>
    <span class="status-msg" id="statusMsg" aria-live="polite">Analyzing URL...</span>
  </div>

  <div id="matchesSection" style="display: none;">
    <div class="section-title">Closest Matches (Diffed)</div>
    <ul class="list-container matches-container" id="matchesList"></ul>
  </div>

  <div class="section-title">All Tracked Applications</div>
  <ul class="list-container" id="jobList"></ul>

  <script type="module" src="popup.js"></script>
</body>
</html>
